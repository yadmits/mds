<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Редактор оффера</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="editor-body">
    <div class="editor-shell">
      <aside class="editor-sidebar" id="sidebar-scroll">
        <header class="sidebar-header">
          <a class="icon-btn" href="./index.html" aria-label="Назад">
            <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M12.9 4.23a.75.75 0 0 1 0 1.06L8.2 10l4.7 4.7a.75.75 0 1 1-1.06 1.06l-5.23-5.23a.75.75 0 0 1 0-1.06l5.23-5.24a.75.75 0 0 1 1.06 0Z"/></svg>
          </a>
          <div class="sidebar-title">
            <strong id="sidebar-title">Имя, Должность</strong>
            <span id="sidebar-subtitle">Ру, 000 000 ₽ / мес.</span>
          </div>
          <button class="icon-btn" id="favorite-btn" aria-label="Избранное"></button>
          <button class="icon-btn" id="duplicate-btn" aria-label="Дублировать">
            <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M6 3.25A2.75 2.75 0 0 0 3.25 6v8A2.75 2.75 0 0 0 6 16.75h5A2.75 2.75 0 0 0 13.75 14V6A2.75 2.75 0 0 0 11 3.25H6Zm0 1.5h5c.69 0 1.25.56 1.25 1.25v8c0 .69-.56 1.25-1.25 1.25H6c-.69 0-1.25-.56-1.25-1.25V6c0-.69.56-1.25 1.25-1.25Z"/><path d="M10.5 5.25a.75.75 0 0 1 .75-.75H14A2.75 2.75 0 0 1 16.75 7.25V13a.75.75 0 1 1-1.5 0V7.25C15.25 6.56 14.69 6 14 6h-2.75a.75.75 0 0 1-.75-.75Z"/></svg>
          </button>
        </header>

        <div class="sidebar-form" id="editor-form"></div>

        <footer class="sidebar-footer">
          <button class="btn btn-primary" id="export-btn" type="button">Скачать PDF</button>
          <div class="footer-meta">
            <span id="saved-at">Сохранен —</span>
            <button class="link-danger" id="delete-btn" type="button">Удалить</button>
          </div>
        </footer>
      </aside>

      <section class="preview-column" id="preview-scroll">
        <div class="preview-stage">
          <div class="preview-scale-wrap" id="preview-scale-wrap">
            <article class="offer-preview" id="offer-preview"></article>
          </div>
        </div>
      </section>
    </div>

    <div class="modal-backdrop hidden" id="delete-modal">
      <div class="delete-modal">
        <div class="delete-emoji">🔥</div>
        <h3>Че прям точно<br/>удаляем?</h3>
        <div class="delete-actions">
          <button class="btn btn-secondary" id="confirm-delete" type="button">Удалить</button>
          <button class="btn btn-primary" id="cancel-delete" type="button">Отменить</button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="./config.js"></script>
    <script src="./data-store.js?v=20260306-3"></script>
    <script src="./editor.js?v=20260306-3"></script>
  </body>
</html>
